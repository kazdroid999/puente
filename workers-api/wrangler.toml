name = "puente-store-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Unbound model: wall time up to 15min, CPU 30s
# Required for Claude API calls that take 10-30s to respond
usage_model = "unbound"

[vars]
ENVIRONMENT = "production"
APP_ORIGIN = "https://puente-saas.com"
API_ORIGIN = "https://api.puente-saas.com"

# Secrets (wrangler secret put で投入):
#   ANTHROPIC_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_CONNECT_CLIENT_ID
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   RESEND_API_KEY
#   CF_API_TOKEN (Pages custom domain registration)
#   PRTIMES_API_KEY (optional)

[[unsafe.custom_domains]]
hostname = "api.puente-saas.com"

[observability]
enabled = true

# ========== Cron Triggers ==========
# 12:00 JST (3:00 UTC) 毎日: Founder 80% OFF クーポンの DB↔Stripe 同期を自動チェック。
# DB に存在する coupon 行に対して Stripe 側 promotion_code が無ければ自動作成し self-heal する。
# scheduled() ハンドラから reconcileAllFounderCoupons() を呼ぶ。
[triggers]
crons = ["0 3 * * *"]
